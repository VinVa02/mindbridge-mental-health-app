<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindBridge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <div>
          <p class="sidebar-label">MindBridge</p>
          <h2>Chats</h2>
        </div>
        <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
      </div>

      <div id="session-list" class="session-list"></div>
    </aside>

    <main class="main-panel">
      <section class="chat-section">
        <header class="chat-header">
          <div>
            <h1>MindBridge</h1>
            <p>Your mental wellness support space</p>
          </div>
        </header>

        <div id="chat-box" class="chat-box">
          <div class="message bot">
            <div class="bubble">
              Hi, I’m here with you. How are you feeling today?
            </div>
          </div>
        </div>

        <div class="composer">
          <div class="input-wrapper">
            <input
              type="text"
              id="message-input"
              placeholder="Type what’s on your mind..."
            />
          </div>

          <button id="voice-chat-btn" class="icon-btn voice-btn" title="Voice chat">
            <span class="icon">🎤</span>
          </button>

          <button id="send-btn" class="send-btn">Send</button>
        </div>

        <p class="helper-text" id="recording-status">
          Voice ready
        </p>
      </section>

      <aside class="side-panel">
        <div class="panel-card mood-card">
          <p class="panel-label">Current Mood</p>
          <h3 id="mood-value">Unknown</h3>
        </div>

        <div class="panel-card risk-card">
          <p class="panel-label">Risk Level</p>
          <h3 id="risk-value">Low</h3>
        </div>

        <div class="panel-card resources-card">
          <div class="resources-header">
            <p class="panel-label">Helpful Resources</p>
          </div>
          <div id="resource-list" class="resource-list">
            <div class="resource-empty">Resources will appear based on the conversation.</div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
